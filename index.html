<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVA Result Portal</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #e6e6e6;
      font-family: monospace;
      letter-spacing: 0.12em;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .portal {
      width: min(90vw, 520px);
      border: 1px solid #8a5cff;
      padding: 32px;
      box-shadow: 0 0 30px rgba(138, 92, 255, 0.25);
      background: linear-gradient(180deg, #111 0%, #050505 100%);
    }

    .label {
      color: #8a5cff;
      font-size: 12px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.3;
      margin: 0 0 24px;
      font-weight: 400;
    }

    .score {
      font-size: 72px;
      color: #8a5cff;
      margin: 24px 0 8px;
    }

    .line {
      border-top: 1px solid #333;
      margin: 24px 0;
    }

    .data {
      display: grid;
      gap: 12px;
      font-size: 14px;
    }

    .status {
      color: #4f8cff;
    }
  </style>
</head>
<body>
  <main class="portal">
    <div class="label">NATIONAL VERIFICATION AUTHORITY</div>
    <h1>YOUR VERIFICATION RESULT</h1>

    <div class="line"></div>

    <div class="data">
      <div>CASE ID: <span id="caseId">TV-2099-8473</span></div>
      <div>TRUTH INDEX</div>
    </div>

    <div class="score">87</div>
    <div>/100</div>

    <div class="line"></div>

    <div class="data">
      <div>STATUS: <span class="status">APPROVED</span></div>
      <div>RISK CLASS: LOW</div>
      <div>COMPLIANCE: HIGH</div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (id) {
      document.getElementById("caseId").textContent = id;
    }
  </script>
</body>
</html>
